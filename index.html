<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Click & Cash Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <style>
        body { -webkit-tap-highlight-color: transparent; user-select: none; }
        .click-animation { animation: pulse 0.1s ease-in-out; }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(0.92); }
            100% { transform: scale(1); }
        }
        .bg-grid { background-image: radial-gradient(#2563eb 0.5px, transparent 0.5px); background-size: 20px 20px; }
    </style>
</head>
<body class="bg-slate-900 text-white flex flex-col items-center justify-between h-screen p-6 font-sans overflow-hidden bg-grid">

    <div class="text-center mt-6">
        <h1 class="text-xs text-slate-400 uppercase tracking-widest font-bold">Solde Actuel</h1>
        <div id="balance" class="text-5xl font-black text-yellow-400 mt-1 drop-shadow-md">0</div>
        <div class="flex items-center justify-center gap-1 mt-1">
            <span class="text-xl text-green-400 font-bold" id="euro">0.00</span>
            <span class="text-green-500 font-bold">€</span>
        </div>
    </div>

    <div class="relative">
        <div id="glow" class="absolute inset-0 bg-blue-600 rounded-full blur-3xl opacity-20 scale-150 animate-pulse"></div>
        <button onclick="mine(this)" id="mainBtn" class="relative bg-gradient-to-br from-blue-500 to-blue-700 w-48 h-48 rounded-full shadow-2xl flex items-center justify-center border-[8px] border-blue-400/30 active:border-blue-300 transition-all">
            <span class="text-6xl">💰</span>
        </button>
    </div>

    <div class="w-full max-w-xs space-y-3">
        <h2 class="text-xs font-bold text-slate-500 uppercase px-2">Boutique d'améliorations</h2>
        
        <div class="bg-slate-800/80 backdrop-blur-sm p-3 rounded-xl border border-slate-700 flex justify-between items-center">
            <div>
                <p class="text-[10px] text-blue-400 font-bold uppercase">Force du Clic</p>
                <p class="text-lg font-bold">x<span id="mult-val">1</span></p>
            </div>
            <button onclick="buyUpgrade('click')" id="btn-upgrade-click" class="bg-blue-600 hover:bg-blue-500 disabled:opacity-30 text-white text-[10px] px-3 py-2 rounded-lg font-bold transition">
                +0.1 (<span id="cost-click">1000</span>)
            </button>
        </div>

        <div class="bg-slate-800/80 backdrop-blur-sm p-3 rounded-xl border border-slate-700 flex justify-between items-center">
            <div>
                <p class="text-[10px] text-purple-400 font-bold uppercase">Auto-Revenu</p>
                <p class="text-lg font-bold"><span id="auto-val">0</span>/s</p>
            </div>
            <button onclick="buyUpgrade('auto')" id="btn-upgrade-auto" class="bg-purple-600 hover:bg-purple-500 disabled:opacity-30 text-white text-[10px] px-3 py-2 rounded-lg font-bold transition">
                +1/s (<span id="cost-auto">5000</span>)
            </button>
        </div>
    </div>

    <div class="w-full max-w-xs mb-4">
        <div class="flex justify-between text-[10px] text-slate-500 mb-1 px-1">
            <span>Objectif Revolut 10€</span>
            <span id="progress-percent">0%</span>
        </div>
        <div class="w-full bg-slate-800 h-1.5 rounded-full overflow-hidden">
            <div id="progress-bar" class="bg-green-500 h-full w-0 transition-all duration-500"></div>
        </div>
        <button onclick="reset()" class="w-full text-center text-[9px] text-slate-600 mt-4 uppercase tracking-tighter">Réinitialiser les données</button>
    </div>

    <script>
        // --- DONNÉES ---
        let score = parseFloat(localStorage.getItem('cc_score')) || 0;
        let multiplier = parseFloat(localStorage.getItem('cc_mult')) || 1;
        let autoIncome = parseFloat(localStorage.getItem('cc_auto')) || 0;
        let costClick = parseFloat(localStorage.getItem('cc_cost_c')) || 1000;
        let costAuto = parseFloat(localStorage.getItem('cc_cost_a')) || 5000;

        const rate = 0.0001;

        // --- LOGIQUE CORE ---
        function updateUI() {
            const euros = score * rate;
            document.getElementById('balance').innerText = Math.floor(score).toLocaleString();
            document.getElementById('euro').innerText = euros.toFixed(2);
            
            // Stats Boutique
            document.getElementById('mult-val').innerText = multiplier.toFixed(1);
            document.getElementById('auto-val').innerText = autoIncome.toFixed(0);
            document.getElementById('cost-click').innerText = Math.floor(costClick);
            document.getElementById('cost-auto').innerText = Math.floor(costAuto);

            // État des boutons
            document.getElementById('btn-upgrade-click').disabled = (score < costClick);
            document.getElementById('btn-upgrade-auto').disabled = (score < costAuto);

            // Progression
            const progress = Math.min((euros / 10) * 100, 100);
            document.getElementById('progress-bar').style.width = progress + "%";
            document.getElementById('progress-percent').innerText = Math.floor(progress) + "%";

            // Sauvegarde
            localStorage.setItem('cc_score', score);
            localStorage.setItem('cc_mult', multiplier);
            localStorage.setItem('cc_auto', autoIncome);
            localStorage.setItem('cc_cost_c', costClick);
            localStorage.setItem('cc_cost_a', costAuto);
        }

        function mine(btn) {
            score += multiplier;
            btn.classList.remove('click-animation');
            void btn.offsetWidth;
            btn.classList.add('click-animation');
            if (navigator.vibrate) navigator.vibrate(10);
            updateUI();
        }

        function buyUpgrade(type) {
            if (type === 'click' && score >= costClick) {
                score -= costClick;
                multiplier += 0.1;
                costClick *= 1.6;
            } else if (type === 'auto' && score >= costAuto) {
                score -= costAuto;
                autoIncome += 1;
                costAuto *= 1.8;
            }
            updateUI();
        }

        // Boucle de revenu passif (toutes les secondes)
        setInterval(() => {
            if (autoIncome > 0) {
                score += autoIncome;
                updateUI();
            }
        }, 1000);

        function reset() {
            if(confirm("Effacer définitivement ta progression ?")) {
                localStorage.clear();
                location.reload();
            }
        }

        updateUI();
    </script>
</body>
</html>
