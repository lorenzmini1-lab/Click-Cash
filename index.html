<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Click & Cash</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        .click-animation { animation: pulse 0.1s ease-in-out; }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(0.92); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body class="bg-slate-900 text-white flex flex-col items-center justify-between h-screen p-8 font-sans overflow-hidden">

    <div class="text-center mt-12">
        <h1 class="text-sm text-slate-400 uppercase tracking-[0.2em] font-bold">Mon Portefeuille</h1>
        <div id="balance" class="text-6xl font-black text-yellow-400 mt-2 drop-shadow-lg">0</div>
        <div class="flex items-center justify-center gap-2 mt-1">
            <span class="text-2xl text-green-400 font-bold" id="euro">0.00</span>
            <span class="text-green-500 font-bold">€</span>
        </div>
    </div>

    <div class="relative">
        <div id="glow" class="absolute inset-0 bg-blue-600 rounded-full blur-3xl opacity-20 scale-150"></div>
        <button onclick="mine(this)" id="mainBtn" class="relative bg-gradient-to-br from-blue-500 to-blue-700 w-56 h-56 rounded-full shadow-2xl flex items-center justify-center border-[10px] border-blue-400/30 group active:border-blue-300 transition-all">
            <div class="bg-blue-600 w-full h-full rounded-full flex items-center justify-center shadow-inner">
                <span class="text-6xl group-active:scale-110 transition-transform">💰</span>
            </div>
        </button>
    </div>

    <div class="w-full max-w-xs space-y-4 mb-8">
        <div class="bg-slate-800/50 backdrop-blur-md p-4 rounded-2xl border border-slate-700">
            <div class="flex justify-between text-xs text-slate-400 mb-1">
                <span>Objectif Revolut (10€)</span>
                <span id="progress-percent">0%</span>
            </div>
            <div class="w-full bg-slate-700 h-2 rounded-full overflow-hidden">
                <div id="progress-bar" class="bg-green-500 h-full w-0 transition-all duration-300"></div>
            </div>
        </div>
        
        <div class="flex justify-between items-center px-2">
            <span class="text-[10px] text-slate-500 italic">10 000 pièces = 1,00 €</span>
            <button onclick="reset()" class="text-[10px] text-red-400/60 hover:text-red-400 transition-colors">Réinitialiser</button>
        </div>
    </div>

    <script>
        let score = parseFloat(localStorage.getItem('clickCash_score')) || 0;
        const rate = 0.0001;
        const payoutThreshold = 10; 

        function updateUI() {
            const euros = score * rate;
            document.getElementById('balance').innerText = Math.floor(score).toLocaleString();
            document.getElementById('euro').innerText = euros.toFixed(2);
            
            const progress = Math.min((euros / payoutThreshold) * 100, 100);
            document.getElementById('progress-bar').style.width = progress + "%";
            document.getElementById('progress-percent').innerText = Math.floor(progress) + "%";
            
            localStorage.setItem('clickCash_score', score);
        }

        function mine(btn) {
            score += 1;
            btn.classList.remove('click-animation');
            void btn.offsetWidth; 
            btn.classList.add('click-animation');
            if (navigator.vibrate) navigator.vibrate(15);
            updateUI();
        }

        function reset() {
            if(confirm("Tout effacer ?")) {
                score = 0;
                updateUI();
            }
        }
        updateUI();
    </script>
</body>
</html>
