<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Click for Cash - Fix Level</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; user-select: none; background-color: #0f172a; transition: background 0.5s; }
        .click-animation { animation: pulse 0.1s ease-in-out; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(0.92); } 100% { transform: scale(1); } }
        .fury-mode { animation: fury-glow 0.5s infinite alternate; border-color: #ef4444 !important; }
        @keyframes fury-glow { from { box-shadow: 0 0 15px #ef4444; } to { box-shadow: 0 0 40px #f87171; } }
        .boost-active { background-color: #1e3a8a !important; }
        .hidden { display: none; }
    </style>
</head>
<body id="main-body" class="text-white flex flex-col items-center justify-between h-screen p-4 font-sans overflow-hidden">

    <div id="reward-modal" class="hidden fixed inset-0 z-50 bg-slate-950/95 backdrop-blur-md flex items-center justify-center p-6 text-center">
        <div class="bg-slate-800 border-2 border-yellow-500 rounded-3xl p-6 w-full max-w-xs shadow-2xl">
            <h2 class="text-2xl font-black text-yellow-500 mb-2">LVL UP !</h2>
            <p class="text-xs text-slate-400 mb-4 font-bold">CHOISIS TON CADEAU :</p>
            <div class="space-y-3">
                <button onclick="applyBonus('xp')" class="w-full bg-blue-600 p-3 rounded-xl font-bold text-sm">🚀 BOOST XP (+20%)</button>
                <button onclick="applyBonus('click')" class="w-full bg-green-600 p-3 rounded-xl font-bold text-sm">⚡ FORCE CLIC (+0.2)</button>
                <button onclick="applyBonus('auto')" class="w-full bg-purple-600 p-3 rounded-xl font-bold text-sm">🤖 AUTO-REVENU (+2/s)</button>
            </div>
        </div>
    </div>

    <div class="w-full flex justify-between items-center p-2">
        <div class="flex flex-col">
            <span class="text-[10px] text-blue-500 font-bold uppercase tracking-widest">NIVEAU <span id="lvl-display">1</span></span>
            <div class="w-32 bg-slate-800 h-1.5 rounded-full overflow-hidden border border-slate-700 mt-1">
                <div id="xp-bar" class="bg-blue-500 h-full w-0 transition-all duration-300"></div>
            </div>
        </div>
        <button onclick="alert('Retrait à 10.00€')" class="bg-green-600 px-4 py-2 rounded-full font-black text-xs shadow-lg">RETRAIT 💳</button>
    </div>

    <div class="text-center">
        <div id="balance" class="text-7xl font-black text-yellow-400">0</div>
        <div class="text-3xl font-bold text-green-400" id="euro">0.00€</div>
        <div id="goal-percent" class="text-[10px] font-bold text-slate-500 mt-1">OBJECTIF 10€: 0%</div>
    </div>

    <div class="w-full max-w-xs text-center">
        <button onclick="startVideoAd()" id="video-btn" class="w-full bg-gradient-to-r from-purple-600 to-indigo-600 p-4 rounded-2xl font-black text-sm shadow-xl border-2 border-indigo-400 active:scale-95 transition-all">
            🎬 VIDÉO BOOST <span id="boost-preview" class="text-yellow-300 ml-1">x6</span>
        </button>
        <p id="boost-timer" class="text-xs font-black text-blue-400 mt-2 hidden animate-pulse">BOOST ACTIF !</p>
    </div>

    <div class="relative">
        <button onclick="activateFury()" id="heart-bonus" class="absolute -top-8 -right-8 text-4xl z-10 p-2">❤️</button>
        <button onclick="mine(this)" id="main-btn" class="relative active:scale-90 transition-all bg-gradient-to-tr from-slate-800 to-slate-700 w-44 h-44 rounded-full border-[10px] border-slate-800 flex items-center justify-center shadow-2xl text-7xl">💰</button>
    </div>

    <div class="w-full max-w-xs grid grid-cols-2 gap-3 mb-4">
        <button onclick="buyUpgrade('click')" id="btn-click" class="bg-slate-800/80 p-3 rounded-2xl border border-blue-500/30 disabled:opacity-30">
            <p class="text-[9px] text-blue-400 font-bold uppercase">Force</p>
            <p class="font-black text-sm">x<span id="next-click-val">0.2</span></p>
            <p class="text-[10px] text-yellow-500 font-bold"><span id="cost-click">200</span> 🪙</p>
        </button>
        <button onclick="buyUpgrade('auto')" id="btn-auto" class="bg-slate-800/80 p-3 rounded-2xl border border-purple-500/30 disabled:opacity-30">
            <p class="text-[9px] text-purple-400 font-bold uppercase">Auto</p>
            <p class="font-black text-sm"><span id="next-auto-val">1</span>/s</p>
            <p class="text-[10px] text-yellow-500 font-bold"><span id="cost-auto">5000</span> 🪙</p>
        </button>
    </div>

    <script>
        let score = parseFloat(localStorage.getItem('v16_score')) || 0;
        let multiplier = parseFloat(localStorage.getItem('v16_mult')) || 0.1;
        let autoIncome = parseFloat(localStorage.getItem('v16_auto')) || 0;
        let level = parseInt(localStorage.getItem('v16_level')) || 1;
        let xp = parseFloat(localStorage.getItem('v16_xp')) || 0;
        
        let isFury = false;
        let isVideoBoost = false;
        const rate = 0.0001; 

        function updateUI() {
            let nextClick = Math.round((multiplier + 0.1) * 10) / 10;
            let costClick = Math.round(nextClick * 1000);
            let nextAuto = autoIncome + 1;
            let costAuto = Math.round(nextAuto * 5000);

            let currentEuro = score * rate;
            let percent = (currentEuro / 10) * 100;

            document.getElementById('balance').innerText = Math.floor(score).toLocaleString();
            document.getElementById('euro').innerText = currentEuro.toFixed(2) + "€";
            document.getElementById('goal-percent').innerText = `OBJECTIF 10€: ${Math.min(percent, 100).toFixed(1)}%`;
            document.getElementById('boost-preview').innerText = `x${5 + level}`;

            document.getElementById('next-click-val').innerText = nextClick.toFixed(1);
            document.getElementById('cost-click').innerText = costClick;
            document.getElementById('next-auto-val').innerText = nextAuto;
            document.getElementById('cost-auto').innerText = costAuto;
            document.getElementById('btn-click').disabled = (score < costClick);
            document.getElementById('btn-auto').disabled = (score < costAuto);

            let xpNeeded = level * 120;
            document.getElementById('lvl-display').innerText = level;
            document.getElementById('xp-bar').style.width = (xp / xpNeeded * 100) + "%";

            // Vérification automatique du Level Up
            if (xp >= xpNeeded && document.getElementById('reward-modal').classList.contains('hidden')) {
                document.getElementById('reward-modal').classList.remove('hidden');
            }

            localStorage.setItem('v16_score', score);
            localStorage.setItem('v16_mult', multiplier);
            localStorage.setItem('v16_auto', autoIncome);
            localStorage.setItem('v16_level', level);
            localStorage.setItem('v16_xp', xp);
        }

        function mine(btn) {
            let activeMult = isVideoBoost ? (multiplier * (5 + level)) : multiplier;
            score += activeMult;
            xp += (isVideoBoost ? 2 : 1);
            btn.classList.add('click-animation');
            setTimeout(() => btn.classList.remove('click-animation'), 100);
            updateUI();
        }

        function applyBonus(type) {
            level++;
            xp = 0;
            score += (level * 500); // Bonus de pièces à chaque niveau
            if (type === 'xp') xp = (level * 120) * 0.2;
            else if (type === 'click') multiplier = Math.round((multiplier + 0.2) * 10) / 10;
            else if (type === 'auto') autoIncome += 2;
            
            document.getElementById('reward-modal').classList.add('hidden');
            updateUI();
        }

        function startVideoAd() {
            alert("Chargement de la publicité vidéo...");
            setTimeout(() => applyVideoReward(), 3000);
        }

        function applyVideoReward() {
            isVideoBoost = true;
            let time = 30;
            document.getElementById('main-body').classList.add('boost-active');
            document.getElementById('boost-timer').classList.remove('hidden');
            document.getElementById('video-btn').classList.add('hidden');

            let countdown = setInterval(() => {
                time--;
                document.getElementById('boost-timer').innerText = `BOOST ACTIF : ${time}s`;
                if (time <= 0) {
                    clearInterval(countdown);
                    isVideoBoost = false;
                    document.getElementById('main-body').classList.remove('boost-active');
                    document.getElementById('boost-timer').classList.add('hidden');
                    document.getElementById('video-btn').classList.remove('hidden');
                }
            }, 1000);
        }

        function activateFury() {
            if (isFury) return;
            isFury = true;
            let timer = 10 + (level - 1);
            document.getElementById('main-btn').classList.add('fury-mode');
            document.getElementById('heart-bonus').classList.add('hidden');
            setTimeout(() => {
                isFury = false;
                document.getElementById('main-btn').classList.remove('fury-mode');
                setTimeout(() => document.getElementById('heart-bonus').classList.remove('hidden'), 30000);
            }, timer * 1000);
        }

        function buyUpgrade(type) {
            let n = (type === 'click') ? Math.round((multiplier + 0.1) * 10) / 10 : autoIncome + 1;
            let cost = (type === 'click') ? n * 1000 : n * 5000;
            if (score >= cost) { score -= cost; if (type === 'click') multiplier = n; else autoIncome = n; }
            updateUI();
        }

        setInterval(() => {
            let gain = isFury ? 100 : autoIncome;
            if (gain > 0) {
                let finalGain = isVideoBoost ? (gain * 2) : gain; 
                score += finalGain;
                xp += (finalGain * 0.1);
                updateUI();
            }
        }, 1000);

        updateUI();
    </script>
</body>
</html>
